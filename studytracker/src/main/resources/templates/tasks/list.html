<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Tracker - My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        body { background: #f0f4f8; }
        .card { border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .section-title { color: #1F3864; font-size: 1.2em; font-weight: bold; margin-bottom: 16px; border-bottom: 2px solid #2E75B6; padding-bottom: 8px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-3">
    <div style="background:#2E75B6;color:white;padding:10px 16px;border-radius:6px;margin-bottom:8px;">
        <strong>Student:</strong> Karanpreet Kaur &nbsp;|&nbsp;
        <strong>Project:</strong> Study Tracker &nbsp;|&nbsp;
        <strong>Theme:</strong> Personal academic task manager for tracking course assignments
    </div>
</div>

<div class="container mt-2">

    <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
    <p th:if="${error}"   class="alert alert-danger"  th:text="${error}"></p>

    <!-- Add Task Form -->
    <div class="card p-4">
        <div class="section-title">Add New Study Task</div>
        <form hx-post="/tasks/fragment"
              hx-target="#task-list"
              hx-swap="outerHTML">

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="title" class="form-label fw-bold">Task Title <span style="color:red;">*</span></label>
                    <input type="text" id="title" name="title"
                           class="form-control"
                           placeholder="e.g. Study for midterm" required>
                </div>
                <div class="col-md-6">
                    <label for="courseId" class="form-label fw-bold">Course <span style="color:red;">*</span></label>
                    <select id="courseId" name="courseId" class="form-select" required>
                        <option value="">-- Select Course --</option>
                        <option th:each="c : ${courses}"
                                th:value="${c.id}"
                                th:text="${c.courseCode + ' - ' + c.name}">
                        </option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="dueDate" class="form-label fw-bold">Due Date <span style="color:red;">*</span> <small class="text-muted">(cannot be in the past)</small></label>
                    <input type="date" id="dueDate" name="dueDate"
                           class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="priorityLevel" class="form-label fw-bold">Priority Level <span style="color:red;">*</span> <small class="text-muted">(1=Low, 5=High)</small></label>
                    <input type="number" id="priorityLevel" name="priorityLevel"
                           class="form-control" min="1" max="5" value="3" required>
                </div>
                <div class="col-12">
                    <label for="notes" class="form-label fw-bold">Notes <small class="text-muted">(optional)</small></label>
                    <textarea id="notes" name="notes" class="form-control"
                              rows="2" placeholder="What needs to be done?"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3 px-4">Add Task</button>
        </form>
    </div>

    <!-- Filter -->
    <div class="card p-4">
        <div class="section-title">Filter Tasks</div>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Course</label>
                <select id="courseFilter" name="courseId"
                        class="form-select"
                        hx-get="/tasks/fragment/list"
                        hx-target="#task-list"
                        hx-swap="outerHTML"
                        hx-include="#courseFilter,#statusFilter">
                    <option value="">All Courses</option>
                    <option th:each="c : ${courses}"
                            th:value="${c.id}"
                            th:text="${c.courseCode}"
                            th:selected="${c.id == selectedCourse}">
                    </option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Status</label>
                <select id="statusFilter" name="status"
                        class="form-select"
                        hx-get="/tasks/fragment/list"
                        hx-target="#task-list"
                        hx-swap="outerHTML"
                        hx-include="#courseFilter,#statusFilter">
                    <option value="">All Statuses</option>
                    <option value="PENDING"     th:selected="${selectedStatus == 'PENDING'}">Pending</option>
                    <option value="IN_PROGRESS" th:selected="${selectedStatus == 'IN_PROGRESS'}">In Progress</option>
                    <option value="COMPLETED"   th:selected="${selectedStatus == 'COMPLETED'}">Completed</option>
                    <option value="CANCELLED"   th:selected="${selectedStatus == 'CANCELLED'}">Cancelled</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Task List -->
    <div class="card p-4" id="task-section">
        <div class="section-title">My Study Tasks</div>
        <div th:replace="~{fragments/task-list :: taskList}"></div>
    </div>

</div>
</body>
</html>
